function Badge({type, children}) {
  const styles = {recommended:{bg:C.primaryBg,color:C.primary},beginner:{bg:C.greenBg,color:C.green},free:{bg:C.blueBg,color:C.blue},active:{bg:C.greenBg,color:C.green},hiatus:{bg:"#F0F0F0",color:"#888"}};
  const s = styles[type]||styles.beginner;
  return <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:s.bg,color:s.color,fontWeight:600,whiteSpace:"nowrap",display:"inline-block"}}>{children}</span>;
}

function PriceTag({event}) {
  if(event.isFree) return <span style={{color:C.blue,fontWeight:700,fontSize:11}}>入場無料</span>;
  if(event.ticketPriceMin===event.ticketPriceMax) return <span style={{fontSize:11,color:C.textSub}}>{event.ticketPriceMin?.toLocaleString()} THB</span>;
  return <span style={{fontSize:11,color:C.textSub}}>{event.ticketPriceMin?.toLocaleString()}〜{event.ticketPriceMax?.toLocaleString()} THB</span>;
}

function NavBar({page, setPage}) {
  return (
    <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"0 10px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 8px rgba(0,0,0,0.06)"}}>
      <div onClick={()=>setPage("home")} style={{cursor:"pointer",padding:"10px 0"}}>
        <span style={{fontWeight:800,fontSize:16,background:`linear-gradient(135deg,${C.primary},${C.primaryLight})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ThaIdol</span><span style={{fontWeight:800,fontSize:16,color:C.gold}}>.info</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:2}}>
        {[{id:"home",l:"ホーム"},{id:"events",l:"ライブ"},{id:"idols",l:"アイドル"},{id:"guide",l:"ガイド"}].map(n=>(
          <button key={n.id} onClick={()=>setPage(n.id)} style={{fontSize:10,padding:"5px 7px",border:"none",cursor:"pointer",background:page===n.id?C.primaryBg:"transparent",color:page===n.id?C.primary:C.textMuted,fontWeight:page===n.id?700:400,borderRadius:7}}>{n.l}</button>
        ))}
        <div style={{display:"flex",border:`1px solid ${C.border}`,borderRadius:20,overflow:"hidden",marginLeft:4}}>
          <div style={{fontSize:10,padding:"3px 8px",background:C.primary,color:"#fff",fontWeight:700}}>日</div>
          <div style={{fontSize:10,padding:"3px 8px",color:C.textMuted}}>ไทย</div>
        </div>
      </div>
    </div>
  );
}

function EventCard({event, onSelect}) {
  const d=new Date(event.date),day=d.getDate(),wd=["日","月","火","水","木","金","土"][d.getDay()];
  return (
    <div onClick={()=>onSelect&&onSelect(event)} style={{border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px",background:C.surface,cursor:onSelect?"pointer":"default",marginBottom:0}} 
      onMouseEnter={e=>{if(onSelect)e.currentTarget.style.boxShadow="0 4px 16px rgba(233,30,140,0.10)"}}
      onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
      <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
        <div style={{textAlign:"center",flexShrink:0,width:40,background:C.primaryBg,borderRadius:8,padding:"6px 0"}}>
          <div style={{fontSize:20,fontWeight:800,color:C.primary,lineHeight:1}}>{day}</div>
          <div style={{fontSize:9,color:C.primary,fontWeight:600}}>{wd}</div>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{event.titleJapanese}</div>
          <div style={{fontSize:10,color:C.textSub,marginBottom:4,display:"flex",alignItems:"center",gap:4}}>
            <span>{event.startTime}〜</span><span>📍 {event.venueName}</span>
            <span style={{fontSize:9,padding:"1px 6px",background:"#E8F0FE",color:C.mapBlue,borderRadius:6,fontWeight:700}}>Map</span>
          </div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:4}}>
            {event.idolGroups.map(g=><span key={g} style={{fontSize:9,padding:"2px 7px",background:C.primaryBg,color:C.primary,borderRadius:8}}>{g}</span>)}
          </div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>
            {event.tags.includes("recommended")&&<Badge type="recommended">日本人おすすめ</Badge>}
            {event.tags.includes("beginner")&&<Badge type="beginner">初心者向け</Badge>}
            {event.isFree&&<Badge type="free">無料</Badge>}
          </div>
          <PriceTag event={event}/>
        </div>
        <button style={{background:event.ticketUrl?C.primary:"#555",color:"#fff",fontSize:9,fontWeight:700,padding:"5px 10px",borderRadius:14,border:"none",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,alignSelf:"center"}}>
          {event.ticketUrl?"チケット":"公式SNS"}
        </button>
      </div>
    </div>
  );
}

      </div>
      <div style={{background:"linear-gradient(135deg,#FFF0F6 0%,#FFE4EB 60%,#FFF5F0 100%)",padding:"28px 16px 24px",textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-20,right:-20,width:120,height:120,borderRadius:"50%",background:"rgba(233,30,140,0.06)"}}/>
        <div style={{position:"absolute",bottom:-30,left:-10,width:80,height:80,borderRadius:"50%",background:"rgba(255,215,0,0.12)"}}/>
        <div style={{fontSize:11,color:C.primary,fontWeight:600,marginBottom:6,letterSpacing:"0.08em"}}>ไอดอลไทยใกล้แค่เอื้อม</div>
        <div style={{fontSize:22,fontWeight:800,color:"#7A0044",lineHeight:1.35,marginBottom:8}}>タイのアイドルライブ、<br/>今夜はここで。</div>
        <div style={{fontSize:12,color:C.textSub,marginBottom:16}}>バンコク・チェンマイのアイドルライブ情報をまとめています</div>
        <button onClick={()=>setPage("events")} style={{background:`linear-gradient(135deg,${C.primary},${C.primaryLight})`,color:"#fff",fontSize:13,fontWeight:700,padding:"11px 24px",borderRadius:28,border:"none",cursor:"pointer",boxShadow:"0 4px 16px rgba(233,30,140,0.35)"}}>📅 今日のライブを見る</button>
      </div>
      <div style={{display:"flex",gap:6,overflowX:"auto",padding:"10px 14px",background:C.surface,borderBottom:`1px solid ${C.border}`}}>

        ))}
      </div>
      <div style={{padding:"14px 14px 0"}}>
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:C.text}}>🎤 今日のライブ</div>
            <button onClick={()=>setPage("events")} style={{fontSize:10,color:C.primary,background:"none",border:"none",cursor:"pointer",fontWeight:600}}>すべて見る →</button>
          </div>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
            {today.map(ev=>(
              <div key={ev.id} onClick={()=>{setSE(ev);setPage("event-detail");}} style={{flexShrink:0,width:140,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",background:C.surface,cursor:"pointer"}}>
                <div style={{height:58,background:`linear-gradient(135deg,${C.primaryBg},#E8B4C8)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>🎤</div>
                <div style={{padding:"7px 9px"}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.primary}}>{ev.startTime}開演</div>
                  <div style={{fontSize:10,color:C.text,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",margin:"2px 0"}}>{ev.titleJapanese}</div>
                  <div style={{fontSize:9,color:C.textMuted}}>📍 {ev.venueArea}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:C.text}}>📅 今週末のライブ</div>
            <button onClick={()=>setPage("events")} style={{fontSize:10,color:C.primary,background:"none",border:"none",cursor:"pointer",fontWeight:600}}>すべて見る →</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>

        <div style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:C.text}}>⭐ 注目グループ</div>
            <button onClick={()=>setPage("idols")} style={{fontSize:10,color:C.primary,background:"none",border:"none",cursor:"pointer",fontWeight:600}}>一覧を見る →</button>
          </div>
          <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:4}}>
            {featured.map(idol=>(
              <div key={idol.id} onClick={()=>{setSI(idol);setPage("idol-detail");}} style={{flexShrink:0,textAlign:"center",width:72,cursor:"pointer"}}>

                <div style={{fontSize:9,fontWeight:700,color:C.text}}>{idol.name}</div>
                <div style={{fontSize:8,color:C.textMuted}}>{idol.genres[0]}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{background:"linear-gradient(135deg,#E6F1FB,#B5D4F4)",borderRadius:12,padding:14,display:"flex",gap:12,alignItems:"center",marginBottom:20}}>
          <div style={{fontSize:30,flexShrink:0}}>📖</div>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"#0C447C",marginBottom:2}}>タイのライブ、初めて？</div>
            <div style={{fontSize:10,color:"#185FA5",marginBottom:7}}>チケットの買い方・アクセス・チェキ文化をやさしく解説</div>

function EventsPage({setPage,setSE}) {
  const [df,setDf]=useState("all"),[af,setAf]=useState("all"),[tf,setTf]=useState("all");
  const filtered=EVENTS.filter(ev=>{
    if(df==="today"&&ev.date!=="2025-05-17")return false;
    if(df==="tomorrow"&&ev.date!=="2025-05-18")return false;
    if(df==="weekend"&&!["2025-05-17","2025-05-18"].includes(ev.date))return false;
    if(af!=="all"&&!ev.venueArea.includes(af))return false;
    if(tf==="free"&&!ev.isFree)return false;
    if(tf==="recommended"&&!ev.tags.includes("recommended"))return false;
    if(tf==="beginner"&&!ev.tags.includes("beginner"))return false;
    return true;
  });
  const grouped=filtered.reduce((acc,ev)=>{if(!acc[ev.date])acc[ev.date]=[];acc[ev.date].push(ev);return acc},{});
  return (
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={{background:C.warningBg,padding:"6px 14px",fontSize:9,color:C.warningText,borderBottom:`1px solid ${C.warning}`}}>⚠️ チケット購入前に必ず主催者の公式SNSで最新情報をご確認ください。</div>
      <div style={{display:"flex",gap:6,overflowX:"auto",padding:"10px 14px",background:C.surface,borderBottom:`1px solid ${C.border}`}}>
        {[{id:"all",l:"すべて"},{id:"today",l:"今日"},{id:"tomorrow",l:"明日"},{id:"weekend",l:"今週末"}].map(c=>(
          <div key={c.id} onClick={()=>setDf(c.id)} style={{flexShrink:0,fontSize:10,padding:"4px 12px",borderRadius:16,cursor:"pointer",background:df===c.id?C.primary:C.surface,color:df===c.id?"#fff":C.textMuted,border:`1px solid ${df===c.id?C.primary:C.border}`,fontWeight:df===c.id?700:400}}>{c.l}</div>
        ))}
      </div>
      <div style={{padding:"8px 14px",background:"#FAFAFA",borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:9,color:C.textMuted,marginBottom:5,fontWeight:600}}>エリア</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
          {[{id:"all",l:"すべて"},{id:"Bangkok",l:"バンコク"},{id:"Chiang Mai",l:"チェンマイ"}].map(c=>(
            <div key={c.id} onClick={()=>setAf(c.id)} style={{fontSize:9,padding:"3px 9px",borderRadius:14,cursor:"pointer",background:af===c.id?C.primary:C.surface,color:af===c.id?"#fff":C.textSub,border:`1px solid ${af===c.id?C.primary:C.border}`}}>{c.l}</div>
          ))}
        </div>
        <div style={{fontSize:9,color:C.textMuted,marginBottom:5,fontWeight:600}}>絞り込み</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {[{id:"all",l:"すべて"},{id:"recommended",l:"日本人おすすめ"},{id:"beginner",l:"初心者向け"},{id:"free",l:"無料"}].map(c=>(
            <div key={c.id} onClick={()=>setTf(c.id)} style={{fontSize:9,padding:"3px 9px",borderRadius:14,cursor:"pointer",background:tf===c.id?C.primaryBg:C.surface,color:tf===c.id?C.primary:C.textSub,border:`1px dashed ${tf===c.id?C.primary:C.border}`,fontWeight:tf===c.id?700:400}}>{c.l}</div>
          ))}
        </div>
      </div>
      <div style={{paddingBottom:20}}>
        {Object.keys(grouped).sort().map(date=>{
          const d=new Date(date),label=`${d.getMonth()+1}月${d.getDate()}日（${["日","月","火","水","木","金","土"][d.getDay()]}）`;
          return (
            <div key={date}>
              <div style={{padding:"8px 14px 4px",fontSize:11,fontWeight:700,color:"#333",background:"#F0EEE8",borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`}}>{label}</div>
              <div style={{padding:"10px 14px",display:"flex",flexDirection:"column",gap:8}}>
                {grouped[date].map(ev=><EventCard key={ev.id} event={ev} onSelect={ev=>{setSE(ev);setPage("event-detail");}}/>)}
              </div>
            </div>
          );
        })}
        {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:C.textMuted,fontSize:13}}>条件に一致するイベントがありません</div>}
      </div>
    </div>
  );
}

function EventDetailPage({event,setPage}) {
  if(!event)return null;
  return (
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={{background:C.warningBg,borderLeft:`3px solid ${C.warning}`,padding:"8px 14px",fontSize:10,color:C.warningText}}>⚠️ この情報は {event.lastCheckedAt} 時点のものです。出演者・時間・会場は予告なく変更される場合があります。</div>
      <div style={{height:140,background:`linear-gradient(135deg,${C.primaryBg},#E8B4C8,#FFE4EB)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:56}}>🎤</div>
      <div style={{padding:"16px 14px"}}>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:800,color:C.text,marginBottom:4,lineHeight:1.3}}>{event.titleJapanese}</div>
          <div style={{fontSize:12,color:C.textMuted,marginBottom:8}}>{event.titleThai}</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {event.tags.includes("recommended")&&<Badge type="recommended">日本人おすすめ</Badge>}
            {event.tags.includes("beginner")&&<Badge type="beginner">初心者向け</Badge>}
            {event.isFree&&<Badge type="free">無料</Badge>}
          </div>
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            {[{l:"📅 開催日",v:event.date,s:event.dayOfWeek},{l:"🕐 開演時間",v:event.startTime+"〜",s:"開場 "+event.openTime,c:C.primary},{l:"📍 会場",v:event.venueName,s:event.venueArea},{l:"🎫 チケット",v:event.isFree?"無料":`${event.ticketPriceMin}〜${event.ticketPriceMax} THB`,c:event.isFree?C.blue:C.text}].map(item=>(
              <div key={item.l}>
                <div style={{fontSize:9,color:C.textMuted,marginBottom:3,fontWeight:600}}>{item.l}</div>
                <div style={{fontSize:14,fontWeight:700,color:item.c||C.text}}>{item.v}</div>
                {item.s&&<div style={{fontSize:10,color:C.textSub}}>{item.s}</div>}
              </div>
            ))}
          </div>
          <button style={{width:"100%",padding:10,background:"#E8F0FE",color:C.mapBlue,border:"none",borderRadius:10,fontSize:12,fontWeight:700,cursor:"pointer",marginBottom:8}}>🗺 Google Mapで会場を見る</button>
          <button style={{width:"100%",padding:12,background:event.ticketUrl?`linear-gradient(135deg,${C.primary},${C.primaryLight})`:"#555",color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>
            {event.ticketUrl?"🎫 チケットを購入する":"📱 主催者SNSで確認する"}
          </button>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:8}}>出演グループ</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {event.idolGroups.map(g=><span key={g} style={{fontSize:11,padding:"5px 12px",background:C.primaryBg,color:C.primary,borderRadius:20,fontWeight:600}}>{g}</span>)}
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:6}}>イベント概要</div>
          <div style={{fontSize:12,color:C.textSub,lineHeight:1.7,background:C.surface,padding:12,borderRadius:8,border:`1px solid ${C.border}`}}>{event.descriptionJapanese}</div>
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:12,marginBottom:14}}>
          <div style={{fontSize:10,color:C.textMuted,marginBottom:6}}>情報源: {event.sourceAccountName} ／ 最終確認: {event.lastCheckedAt}</div>
          <button style={{width:"100%",padding:8,background:"#F5F5F5",color:C.textSub,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer"}}>🔗 公式情報を確認する →</button>
        </div>
        <div style={{textAlign:"center",marginBottom:20}}>
          <button onClick={()=>setPage("events")} style={{fontSize:11,color:C.primary,background:"none",border:"none",cursor:"pointer"}}>← イベント一覧に戻る</button>
        </div>
      </div>
    </div>
  );
}

function IdolsPage({setPage,setSI}) {
  const [sf,setSf]=useState("all"),[rf,setRf]=useState(false),[bf,setBf]=useState(false);
  const filtered=IDOLS.filter(i=>{
    if(sf==="active"&&i.status!=="active")return false;
    if(rf&&!i.recommendedForJapaneseFans)return false;
    if(bf&&!i.beginnerFriendly)return false;
    return true;
  });
  return (
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={{padding:"12px 14px 8px",background:C.surface,borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:16,fontWeight:800,color:C.text}}>アイドルグループ一覧</div>
        <div style={{fontSize:10,color:C.textMuted}}>{filtered.length}グループ掲載中</div>
      </div>
      <div style={{padding:"10px 14px",background:"#FAFAFA",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",gap:5,marginBottom:8}}>
          {[{id:"all",l:"すべて"},{id:"active",l:"活動中のみ"}].map(c=>(
            <div key={c.id} onClick={()=>setSf(c.id)} style={{fontSize:9,padding:"3px 9px",borderRadius:14,cursor:"pointer",background:sf===c.id?C.primary:C.surface,color:sf===c.id?"#fff":C.textSub,border:`1px solid ${sf===c.id?C.primary:C.border}`}}>{c.l}</div>
          ))}
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          <div onClick={()=>setRf(!rf)} style={{fontSize:9,padding:"3px 9px",borderRadius:14,cursor:"pointer",background:rf?C.primaryBg:C.surface,color:rf?C.primary:C.textSub,border:`1px dashed ${rf?C.primary:C.border}`,fontWeight:rf?700:400}}>{rf?"✓ ":""}日本人おすすめ</div>
          <div onClick={()=>setBf(!bf)} style={{fontSize:9,padding:"3px 9px",borderRadius:14,cursor:"pointer",background:bf?C.greenBg:C.surface,color:bf?C.green:C.textSub,border:`1px dashed ${bf?C.green:C.border}`,fontWeight:bf?700:400}}>{bf?"✓ ":""}初心者向け</div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,padding:"12px 14px"}}>
        {filtered.map(idol=>(
          <div key={idol.id} onClick={()=>{setSI(idol);setPage("idol-detail");}} style={{border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",background:C.surface,cursor:"pointer",opacity:idol.status==="hiatus"?0.65:1}}
            onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.10)"}
            onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
            <div style={{height:80,background:idol.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,position:"relative"}}>
              {idol.emoji}
              {idol.recommendedForJapaneseFans&&<span style={{position:"absolute",top:5,left:5,fontSize:8,padding:"2px 5px",background:"rgba(255,240,246,0.95)",color:C.primary,borderRadius:6,fontWeight:700}}>日本人おすすめ</span>}
              <span style={{position:"absolute",top:5,right:5,fontSize:8,padding:"2px 6px",borderRadius:8,fontWeight:700,background:idol.status==="active"?C.greenBg:"#F0F0F0",color:idol.status==="active"?C.green:"#888"}}>{idol.status==="active"?"活動中":"休止中"}</span>
            </div>
            <div style={{padding:"8px 9px"}}>
              <div style={{fontSize:12,fontWeight:700,color:C.text}}>{idol.name}</div>
              <div style={{fontSize:9,color:C.textMuted,marginBottom:5}}>{idol.nameJapanese}</div>
              <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:5}}>
                {idol.genres.map(g=><span key={g} style={{fontSize:8,padding:"2px 5px",background:"#F5F5F0",borderRadius:6,color:C.textSub}}>{g}</span>)}
              </div>
              <div style={{fontSize:11,color:C.textMuted,display:"flex",gap:5}}>
                {idol.socialLinks.x&&<span>𝕏</span>}
                {idol.socialLinks.instagram&&<span>📸</span>}
                {idol.socialLinks.youtube&&<span>▶</span>}
                {idol.socialLinks.tiktok&&<span>🎵</span>}
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function IdolDetailPage({idol,setPage}) {
  if(!idol)return null;
  const upcomingEvents=EVENTS.filter(e=>e.idolGroups.includes(idol.name));
  return (
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={{height:130,background:idol.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:56}}>{idol.emoji}</div>
      <div style={{padding:"16px 14px"}}>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:22,fontWeight:800,color:C.text}}>{idol.name}</div>
          <div style={{fontSize:12,color:C.textMuted,marginBottom:2}}>{idol.nameJapanese}</div>
          <div style={{fontSize:11,color:C.textMuted,marginBottom:10}}>{idol.nameThai}</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
            {idol.genres.map(g=><span key={g} style={{fontSize:10,padding:"3px 9px",background:C.primaryBg,color:C.primary,borderRadius:10}}>{g}</span>)}
            <Badge type={idol.status}>{idol.status==="active"?"活動中":"休止中"}</Badge>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {idol.socialLinks.x&&<button style={{fontSize:11,padding:"6px 12px",background:"#000",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>𝕏 Twitter</button>}
            {idol.socialLinks.instagram&&<button style={{fontSize:11,padding:"6px 12px",background:"linear-gradient(135deg,#E1306C,#833AB4)",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>📸 Instagram</button>}
            {idol.socialLinks.youtube&&<button style={{fontSize:11,padding:"6px 12px",background:"#FF0000",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>▶ YouTube</button>}
          </div>
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:12,marginBottom:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[{l:"所属事務所",v:idol.agency},{l:"デビュー年",v:idol.debutYear+"年"},{l:"活動拠点",v:idol.baseArea},{l:"ライブ頻度",v:{high:"多い",medium:"普通",low:"少ない"}[idol.liveFrequency]}].map(i=>(
              <div key={i.l}><div style={{fontSize:9,color:C.textMuted,fontWeight:600,marginBottom:2}}>{i.l}</div><div style={{fontSize:12,fontWeight:600,color:C.text}}>{i.v}</div></div>
            ))}
          </div>
        </div>
        {idol.recommendedForJapaneseFans&&(
          <div style={{background:C.primaryBg,border:`1px solid ${C.primaryLight}`,borderRadius:10,padding:12,marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:C.primary,marginBottom:4}}>🇯🇵 日本人ファンへ</div>
            <div style={{fontSize:11,color:C.textSub,lineHeight:1.7}}>日本式アイドル文化を取り入れており、握手会・チェキ会・コールなど日本のファン文化に馴染みやすいグループです。</div>
          </div>
        )}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:6}}>概要</div>
          <div style={{fontSize:12,color:C.textSub,lineHeight:1.7}}>{idol.descriptionJapanese}</div>
        </div>
        {upcomingEvents.length>0&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:8}}>今後の出演ライブ</div>
            {upcomingEvents.map(ev=>(
              <div key={ev.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div>
                  <div style={{fontSize:11,fontWeight:600,color:C.text}}>{ev.titleJapanese}</div>
                  <div style={{fontSize:9,color:C.textMuted}}>{ev.date} {ev.startTime}〜 / {ev.venueName}</div>
                </div>
                <PriceTag event={ev}/>
              </div>
            ))}
          </div>
        )}
        <div style={{textAlign:"center",marginBottom:20}}>
          <button onClick={()=>setPage("idols")} style={{fontSize:11,color:C.primary,background:"none",border:"none",cursor:"pointer"}}>← グループ一覧に戻る</button>
        </div>
      </div>
    </div>
  );
}

function GuidePage() {
  const [tab,setTab]=useState("japanese");
  const sections=tab==="japanese"?[
    {icon:"🎫",title:"チケットの買い方",body:"タイのアイドルライブのチケットは主にEventpopで購入できます。クレジットカードが使えます。当日券も多いですが、人気イベントは事前購入がおすすめです。"},
    {icon:"📍",title:"会場への行き方",body:"バンコク市内の会場はBTS（スカイトレイン）やMRT（地下鉄）でアクセスできます。GoogleマップにBTS/MRT駅名を入れて検索するのが最も簡単です。"},
    {icon:"📸",title:"チェキ文化",body:"タイのアイドルライブでもチェキ（インスタントフォト）が撮れることがあります。価格は100〜300 THBが目安。会場の物販コーナーで案内されています。"},
    {icon:"🛍",title:"物販の流れ",body:"開場前または終演後に物販（グッズ販売）が行われます。タイバーツの現金を用意しておくとスムーズです。"},
    {icon:"🗣",title:"使えるタイ語",body:"「コップンカップ（ありがとう）」「チャン チョープ（好きです）」など。ライブでは「สู้ๆ（シュー・シュー）」が応援の言葉です。"},
    {icon:"⚠️",title:"注意点",body:"情報は変更される場合があります。必ず主催者の公式SNSで最新情報を確認してから会場に行きましょう。"},
  ]:[
    {icon:"🇯🇵",title:"日本式アイドル文化とは",body:"日本のアイドルは「会いに行ける」をコンセプトにした近距離ファン文化が特徴です。握手会、チェキ（インスタント写真）、コール（掛け声）などが主な文化です。"},
    {icon:"📸",title:"チェキ文化",body:"チェキとはアイドルとインスタント写真を撮ること。日本では一般的で、タイでも広まっています。撮影後にサインをもらえることもあります。"},
    {icon:"🎤",title:"コール文化",body:"曲に合わせて特定のフレーズを叫ぶ「コール」は日本のアイドルライブの醍醐味。初めてでもまわりに合わせると楽しめます。"},
    {icon:"🌏",title:"日本人ファンへ届けるメリット",body:"あなたのグループが日本語情報を発信すると、タイに訪問する日本人観光客がライブに来てくれる可能性があります。掲載依頼はフォームからどうぞ。"},
  ];
  return (
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={{padding:"12px 14px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:16,fontWeight:800,color:C.text}}>📖 初心者ガイド</div>
      </div>
      <div style={{display:"flex",background:C.surface,borderBottom:`1px solid ${C.border}`}}>
        {[{id:"japanese",l:"🇯🇵 日本人向け"},{id:"thai",l:"🇹🇭 タイ人向け"}].map(t=>(
          <div key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,textAlign:"center",padding:10,fontSize:11,color:tab===t.id?C.primary:C.textMuted,borderBottom:tab===t.id?`2px solid ${C.primary}`:"none",fontWeight:tab===t.id?700:400,cursor:"pointer"}}>{t.l}</div>
        ))}
      </div>
      <div style={{padding:"14px 14px"}}>
        {sections.map((s,i)=>(
          <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:10}}>
            <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:6}}>{s.icon} {s.title}</div>
            <div style={{fontSize:12,color:C.textSub,lineHeight:1.8}}>{s.body}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function BottomNav({page,setPage}) {
  return (
    <div style={{position:"sticky",bottom:0,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",boxShadow:"0 -2px 12px rgba(0,0,0,0.06)"}}>
      {[{id:"home",l:"ホーム",icon:"🏠"},{id:"events",l:"ライブ",icon:"🎤"},{id:"idols",l:"アイドル",icon:"⭐"},{id:"guide",l:"ガイド",icon:"📖"}].map(item=>(
        <button key={item.id} onClick={()=>setPage(item.id)} style={{flex:1,padding:"8px 0",border:"none",cursor:"pointer",background:"transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <div style={{fontSize:18}}>{item.icon}</div>
          <div style={{fontSize:9,fontWeight:page===item.id?700:400,color:page===item.id?C.primary:C.textMuted}}>{item.l}</div>
          {page===item.id&&<div style={{width:16,height:2,background:C.primary,borderRadius:2}}/>}
        </button>
      ))}
    </div>
  );
}

function App() {
  const [page,setPage]=useState("home");
  const [se,setSE]=useState(null);
  const [si,setSI]=useState(null);
  const showBottom=!["event-detail","idol-detail"].includes(page);
  const renderPage=()=>{
    switch(page){
      case"home":return <HomePage setPage={setPage} setSE={setSE} setSI={setSI}/>;
      case"events":return <EventsPage setPage={setPage} setSE={setSE}/>;
      case"event-detail":return <EventDetailPage event={se} setPage={setPage}/>;
      case"idols":return <IdolsPage setPage={setPage} setSI={setSI}/>;
      case"idol-detail":return <IdolDetailPage idol={si} setPage={setPage}/>;
      case"guide":return <GuidePage/>;
      default:return <HomePage setPage={setPage} setSE={setSE} setSI={setSI}/>;
    }
  };
  return (
    <div style={{maxWidth:430,margin:"0 auto",background:C.surface,minHeight:"100vh",display:"flex",flexDirection:"column",boxShadow:"0 0 40px rgba(0,0,0,0.15)",borderRadius:0}}>
      <NavBar page={page} setPage={setPage}/>
      <div style={{flex:1,overflowY:"auto"}}>{renderPage()}</div>
      {showBottom&&<BottomNav page={page} setPage={setPage}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
