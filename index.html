<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThaIdol.info — Preview</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root{--bg:#FFF8FB;--surface:#fff;--primary:#E91E8C;--accent:#FF6B9D;--soft:#FFF0F6;--text:#1A1A1A;--muted:#666;--border:#F0DDE6;--warn:#FFFBEB;--map:#4285F4}
    *{box-sizing:border-box} body{margin:0;background:#f4f4f6;color:var(--text);font-family:Inter,"Noto Sans JP","IBM Plex Sans Thai",system-ui,sans-serif}
    #root{max-width:440px;min-height:100vh;margin:0 auto;background:var(--surface);box-shadow:0 8px 28px rgba(0,0,0,.12)}
    .row{display:flex;align-items:center}.between{justify-content:space-between}.muted{color:var(--muted)}
    .section{padding:20px 16px}.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px}
    .btn{border:1px solid var(--border);border-radius:10px;padding:9px 12px;background:#fff;font-weight:700;cursor:pointer}
    .btn-primary{border-color:transparent;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff}
    .badge{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid var(--border);display:inline-block;background:#fafafa}
    .rec{background:var(--soft);color:var(--primary)}.beg{background:#f1f8f1;color:#2f6b2f}.free{background:#eef5ff;color:#2458a8}.active{background:#f1f8f1;color:#2f6b2f}.hiatus{background:#f5f5f5;color:#777}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useMemo,useState}=React;
const EVENTS=[
{id:"e1",title:"CANDY PARADE — Spring Edition",date:"2025-05-17",open:"17:30",start:"18:00",venue:"RCA Plaza",area:"Bangkok",groups:["SugarBite","Candy Pop"],tags:["recommended","beginner"],free:false,desc:"春の大型合同ライブ。物販・チェキ会あり。",source:"SugarBite Official",checked:"2025-05-15"},
{id:"e2",title:"STARLIGHT FES vol.8",date:"2025-05-18",open:"13:30",start:"14:00",venue:"Siam Square One",area:"Bangkok",groups:["Rosé Girls","Candy Pop"],tags:["beginner"],free:true,desc:"無料の屋外ライブフェス。",source:"StarLight Event",checked:"2025-05-14"},
{id:"e3",title:"Chiang Mai Idol Night",date:"2025-05-24",open:"18:00",start:"18:30",venue:"Nimman Hall",area:"Chiang Mai",groups:["NorthStar Girls"],tags:["beginner"],free:false,desc:"チェンマイ最大の屋内ライブ。",source:"CM Idol Event",checked:"2025-05-13"}
];
const IDOLS=[
{id:"i1",name:"BNK48",jp:"ビーエヌケー48",th:"บีเอ็นเค48",status:"active",rec:true,beg:true,agency:"BNK48 Office",base:"Bangkok",desc:"タイのアイドルシーンをリード。",sns:["X","Instagram","YouTube"]},
{id:"i2",name:"SugarBite",jp:"シュガーバイト",th:"ชูการ์ไบต์",status:"active",rec:true,beg:true,agency:"Sweet Production",base:"Bangkok",desc:"可愛さとライブ頻度で人気。",sns:["X","Instagram","TikTok"]},
{id:"i3",name:"Moon Prism",jp:"ムーンプリズム",th:"มูน พริสซึ่ม",status:"hiatus",rec:false,beg:false,agency:"Lunar Arts",base:"Bangkok",desc:"現在活動休止中。",sns:["Instagram"]}
];
const Badge=({t,children})=><span className={`badge ${t||""}`}>{children}</span>;
const DisclaimerBanner=()=> <div style={{padding:"8px 16px",background:"var(--warn)",fontSize:12,borderBottom:"1px solid #f3e6bb"}}>掲載情報は変更される場合があります。必ず公式情報をご確認ください。</div>;
function Header({page,setPage}){const tabs=[["home","Home"],["events","Events"],["idols","Idols"],["guide","Guide"]];return <header className="row between" style={{position:"sticky",top:0,zIndex:5,padding:"10px 12px",background:"#fff",borderBottom:"1px solid var(--border)"}}><div style={{fontWeight:900,color:"var(--primary)",fontSize:20}}>ThaIdol.info</div><div className="row" style={{gap:6}}>{tabs.map(([k,l])=><button key={k} className="btn" onClick={()=>setPage(k)} style={{fontSize:11,padding:"6px 8px",background:page===k?"var(--soft)":"#fff",color:page===k?"var(--primary)":"var(--muted)"}}>{l}</button>)}</div></header>}
function EventCard({e,onSelect}){return <div className="card" onClick={()=>onSelect?.(e)} style={{display:"grid",gap:10,cursor:onSelect?"pointer":"default"}}><div className="row between"><strong style={{fontSize:17}}>{e.date} {e.start}</strong><span className="muted" style={{fontSize:12}}>open {e.open}</span></div><div style={{fontWeight:800,lineHeight:1.4}}>{e.title}</div><div className="muted" style={{fontSize:13}}>{e.venue} / {e.area}</div><div className="row" style={{gap:6,flexWrap:"wrap"}}>{e.tags.includes("recommended")&&<Badge t="rec">日本人おすすめ</Badge>}{e.tags.includes("beginner")&&<Badge t="beg">初心者向け</Badge>}{e.free&&<Badge t="free">無料</Badge>}</div><div className="row" style={{gap:8}}><button className="btn" style={{color:"var(--map)"}}>Map</button><button className="btn btn-primary">{e.free?"詳細を見る":"チケット"}</button></div></div>}
function IdolCard({i,onSelect}){return <div className="card" onClick={()=>onSelect(i)} style={{cursor:"pointer"}}><div className="row between"><strong>{i.name}</strong><Badge t={i.status}>{i.status==="active"?"活動中":"休止中"}</Badge></div><div className="muted" style={{fontSize:12,marginTop:4}}>{i.jp}</div><div className="row" style={{gap:6,marginTop:8,flexWrap:"wrap"}}>{i.rec&&<Badge t="rec">日本人おすすめ</Badge>}{i.beg&&<Badge t="beg">初心者向け</Badge>}</div></div>}
function BottomNav({page,setPage}){const tabs=[["home","Home"],["events","Events"],["idols","Idols"],["guide","Guide"]];return <nav className="row" style={{position:"sticky",bottom:0,borderTop:"1px solid var(--border)",background:"#fff"}}>{tabs.map(([k,l])=><button key={k} onClick={()=>setPage(k)} style={{flex:1,padding:"10px 0",border:0,background:"transparent",fontWeight:700,color:page===k?"var(--primary)":"var(--muted)"}}>{l}</button>)}</nav>}
function App(){const [page,setPage]=useState("home"),[se,setSE]=useState(EVENTS[0]),[si,setSI]=useState(IDOLS[0]),[guideTab,setGuideTab]=useState("jp");const [dateFilter,setDate]=useState("all"),[areaFilter,setArea]=useState("all"),[tagFilter,setTag]=useState("all");const [activeOnly,setActive]=useState(false),[recOnly,setRec]=useState(false),[begOnly,setBeg]=useState(false);
const filteredEvents=useMemo(()=>EVENTS.filter(e=>(dateFilter==="all"||e.date===dateFilter)&&(areaFilter==="all"||e.area===areaFilter)&&(tagFilter==="all"||(tagFilter==="recommended"&&e.tags.includes("recommended"))||(tagFilter==="beginner"&&e.tags.includes("beginner"))||(tagFilter==="free"&&e.free))),[dateFilter,areaFilter,tagFilter]);
const filteredIdols=useMemo(()=>IDOLS.filter(i=>(!activeOnly||i.status==="active")&&(!recOnly||i.rec)&&(!begOnly||i.beg)),[activeOnly,recOnly,begOnly]);
const today=EVENTS.filter(e=>e.date==="2025-05-17"),weekend=EVENTS.filter(e=>["2025-05-17","2025-05-18"].includes(e.date));
return <><Header page={page} setPage={setPage}/><DisclaimerBanner/>
{page==="home"&&<main><section className="section" style={{background:"linear-gradient(145deg,#fff,#fff0f6)",borderBottom:"1px solid var(--border)"}}><div style={{fontSize:11,letterSpacing:".1em",textTransform:"uppercase",color:"var(--primary)",fontWeight:700}}>Bangkok Underground Idol Guide</div><h1 style={{fontSize:28,lineHeight:1.35,margin:"8px 0 10px"}}>タイの地下アイドルライブ、今夜はここで。</h1><p className="muted" style={{fontSize:13,lineHeight:1.6,margin:"0 0 14px"}}>Bangkok / Chiang Maiのライブ情報を、旅行者にもローカルにも見やすく整理。</p><button className="btn btn-primary" onClick={()=>setPage("events")}>今日のライブを見る</button></section><section className="section"><div className="row between"><h2 style={{margin:0,fontSize:18}}>今日のライブ</h2><button className="btn" style={{fontSize:11,padding:"5px 8px"}} onClick={()=>setPage("events")}>一覧へ</button></div><div style={{display:"grid",gap:10,marginTop:10}}>{today.map(e=><EventCard key={e.id} e={e} onSelect={(x)=>{setSE(x);setPage("event-detail")}}/>)}</div></section><section className="section"><h2 style={{margin:0,fontSize:18}}>今週末のライブ</h2><div style={{display:"grid",gap:10,marginTop:10}}>{weekend.map(e=><EventCard key={e.id} e={e} onSelect={(x)=>{setSE(x);setPage("event-detail")}}/>)}</div></section><section className="section"><h2 style={{margin:0,fontSize:18}}>注目グループ</h2><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>{IDOLS.filter(i=>i.rec).map(i=><IdolCard key={i.id} i={i} onSelect={(x)=>{setSI(x);setPage("idol-detail")}}/>)}</div></section><section className="section"><div className="card" style={{background:"#f7fbff"}}><strong>初心者ガイド</strong><p className="muted" style={{margin:"6px 0 10px",fontSize:13}}>チケット購入・アクセス・会場マナーを分かりやすく解説。</p><button className="btn" style={{color:"#2458a8"}} onClick={()=>setPage("guide")}>ガイドを見る</button></div></section></main>}
{page==="events"&&<main className="section"><h2 style={{marginTop:0}}>Events</h2><div className="row" style={{gap:6,flexWrap:"wrap",marginBottom:8}}>{["all","2025-05-17","2025-05-18"].map(d=><button key={d} className="btn" style={{fontSize:11,padding:"5px 8px",background:dateFilter===d?"var(--soft)":"#fff"}} onClick={()=>setDate(d)}>{d==="all"?"日付:すべて":d}</button>)}</div><div className="row" style={{gap:6,flexWrap:"wrap",marginBottom:8}}>{["all","Bangkok","Chiang Mai"].map(a=><button key={a} className="btn" style={{fontSize:11,padding:"5px 8px",background:areaFilter===a?"var(--soft)":"#fff"}} onClick={()=>setArea(a)}>{a==="all"?"エリア:すべて":a}</button>)}</div><div className="row" style={{gap:6,flexWrap:"wrap",marginBottom:12}}>{[["all","すべて"],["recommended","日本人おすすめ"],["beginner","初心者向け"],["free","無料"]].map(([k,l])=><button key={k} className="btn" style={{fontSize:11,padding:"5px 8px",background:tagFilter===k?"var(--soft)":"#fff"}} onClick={()=>setTag(k)}>{l}</button>)}</div><div style={{display:"grid",gap:10}}>{filteredEvents.map(e=><EventCard key={e.id} e={e} onSelect={(x)=>{setSE(x);setPage("event-detail")}}/>)}</div></main>}
{page==="event-detail"&&<main className="section"><button className="btn" onClick={()=>setPage("events")}>← Events</button><h2 style={{fontSize:24,margin:"12px 0 8px"}}>{se.title}</h2><div className="muted" style={{fontSize:13}}>{se.date} / 開場 {se.open} / 開演 {se.start}</div><div className="card" style={{marginTop:12}}><div style={{fontWeight:700,marginBottom:4}}>会場</div><div>{se.venue}</div><div className="muted" style={{fontSize:13}}>{se.area}</div><div className="row" style={{gap:8,marginTop:12}}><button className="btn" style={{color:"var(--map)"}}>Google Map</button><button className="btn btn-primary">チケット</button></div></div><div className="card" style={{marginTop:12}}><strong>出演グループ</strong><div className="muted" style={{marginTop:6}}>{se.groups.join(" / ")}</div></div><div className="card" style={{marginTop:12}}><strong>イベント概要</strong><p className="muted">{se.desc}</p><p className="muted">情報源: {se.source}</p><p className="muted">最終確認日: {se.checked}</p></div></main>}
{page==="idols"&&<main className="section"><h2 style={{marginTop:0}}>Idols</h2><div className="row" style={{gap:6,flexWrap:"wrap",marginBottom:12}}><button className="btn" style={{fontSize:11,padding:"5px 8px",background:activeOnly?"var(--soft)":"#fff"}} onClick={()=>setActive(v=>!v)}>活動中のみ</button><button className="btn" style={{fontSize:11,padding:"5px 8px",background:recOnly?"var(--soft)":"#fff"}} onClick={()=>setRec(v=>!v)}>日本人おすすめ</button><button className="btn" style={{fontSize:11,padding:"5px 8px",background:begOnly?"var(--soft)":"#fff"}} onClick={()=>setBeg(v=>!v)}>初心者向け</button></div><div style={{display:"grid",gap:10}}>{filteredIdols.map(i=><IdolCard key={i.id} i={i} onSelect={(x)=>{setSI(x);setPage("idol-detail")}}/>)}</div></main>}
{page==="idol-detail"&&<main className="section"><button className="btn" onClick={()=>setPage("idols")}>← Idols</button><h2 style={{margin:"12px 0 6px"}}>{si.name}</h2><div className="muted" style={{fontSize:13}}>{si.jp} / {si.th}</div><div className="card" style={{marginTop:12}}><p style={{marginTop:0}}>{si.desc}</p><p className="muted">所属事務所: {si.agency}</p><p className="muted">活動拠点: {si.base}</p><p className="muted">SNS: {si.sns.join(" / ")}</p></div><div className="card" style={{marginTop:12}}><strong>今後の出演ライブ</strong>{EVENTS.filter(e=>e.groups.includes(si.name)).map(e=><div key={e.id} className="muted" style={{marginTop:6}}>{e.date} {e.title}</div>)}</div></main>}
{page==="guide"&&<main className="section"><h2 style={{marginTop:0}}>Guide</h2><div className="row" style={{gap:8,marginBottom:10}}><button className="btn" style={{background:guideTab==="jp"?"var(--soft)":"#fff"}} onClick={()=>setGuideTab("jp")}>日本人向け</button><button className="btn" style={{background:guideTab==="th"?"var(--soft)":"#fff"}} onClick={()=>setGuideTab("th")}>タイ人向け</button></div><div className="card">{guideTab==="jp"?"チケット購入・アクセス・会場マナーを解説。":"日本式アイドル文化・チェキ・コール文化を解説。"}</div></main>}
<footer style={{padding:"18px 16px",borderTop:"1px solid var(--border)",background:"#fff"}}><div className="row" style={{gap:12,flexWrap:"wrap",fontSize:13}}><span>About</span><span>情報修正</span><span>免責事項</span><span>SNS</span></div><div className="muted" style={{fontSize:12,marginTop:8}}>Unofficial Thai underground idol guide.</div></footer><BottomNav page={page} setPage={setPage}/></>}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
