<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThaIdol.info — Preview</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root {
      --bg:#FFF8FB; --surface:#fff; --primary:#E91E8C; --accent:#FF6B9D; --soft:#FFF0F6;
      --text:#1A1A1A; --muted:#666; --border:#F0DDE6; --warn:#FFFBEB; --map:#4285F4;
    }
    *{box-sizing:border-box} body{margin:0;background:#f3f4f6;font-family:Inter,"Noto Sans JP","IBM Plex Sans Thai",system-ui,sans-serif;color:var(--text)}
    #root{max-width:440px;margin:0 auto;min-height:100vh;background:var(--surface);box-shadow:0 8px 36px rgba(20,20,20,.12)}
    .row{display:flex;align-items:center}.between{justify-content:space-between}.muted{color:var(--muted)}
    .btn{border:1px solid transparent;border-radius:10px;padding:10px 12px;font-weight:700;cursor:pointer}
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff}
    .btn-soft{background:#fff;border-color:var(--border);color:var(--text)}
    .section{padding:18px 16px}.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px}
    .badge{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--border);background:#fafafa;display:inline-block}
    .badge.rec{background:var(--soft);color:var(--primary)} .badge.beg{background:#f5fbf5;color:#2d6a2d}
    .badge.free{background:#edf5ff;color:#2458a8} .badge.active{background:#f5fbf5;color:#2d6a2d}
    .badge.hiatus{background:#f5f5f5;color:#666}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const EVENTS=[{id:"e1",title:"CANDY PARADE — Spring Edition",date:"2025-05-17",open:"17:30",start:"18:00",venue:"RCA Plaza",area:"Bangkok - RCA",groups:["SugarBite","Candy Pop"],tags:["recommended","beginner"],free:false,desc:"春の大型合同ライブ。",source:"SugarBite Official",checked:"2025-05-15"},{id:"e2",title:"STARLIGHT FES vol.8",date:"2025-05-18",open:"13:30",start:"14:00",venue:"Siam Square One",area:"Bangkok - Siam",groups:["Rosé Girls","Candy Pop"],tags:["beginner"],free:true,desc:"無料の屋外ライブフェス。",source:"StarLight Event",checked:"2025-05-14"}];
const IDOLS=[{id:"i1",name:"BNK48",jp:"ビーエヌケー48",th:"บีเอ็นเค48",status:"active",rec:true,beg:true,agency:"BNK48 Office",base:"Bangkok",desc:"タイのアイドルシーンをリード。",sns:["X","Instagram","YouTube"]},{id:"i2",name:"Moon Prism",jp:"ムーンプリズム",th:"มูน พริสซึ่ม",status:"hiatus",rec:false,beg:false,agency:"Lunar Arts",base:"Bangkok",desc:"現在活動休止中。",sns:["Instagram"]}];

const Badge=({t,children})=><span className={`badge ${t||""}`}>{children}</span>;
const DisclaimerBanner=()=> <div style={{background:"var(--warn)",padding:"8px 16px",fontSize:12,borderBottom:"1px solid #f4e5b6"}}>掲載情報は変更される場合があります。必ず公式情報をご確認ください。</div>;

function Header({page,setPage}){const tabs=[["home","Home"],["events","Events"],["idols","Idols"],["guide","Guide"]];
return <header className="row between" style={{position:"sticky",top:0,zIndex:2,background:"#fff",borderBottom:"1px solid var(--border)",padding:"10px 12px"}}>
  <div style={{fontWeight:900,fontSize:20,color:"var(--primary)"}}>ThaIdol.info</div>
  <div className="row" style={{gap:6,flexWrap:"wrap"}}>{tabs.map(([k,l])=><button key={k} onClick={()=>setPage(k)} className="btn" style={{padding:"6px 9px",fontSize:11,background:page===k?"var(--soft)":"#fff",borderColor:"var(--border)",color:page===k?"var(--primary)":"var(--muted)"}}>{l}</button>)}</div>
</header>}

function EventCard({e,onSelect}){return <div className="card" onClick={()=>onSelect?.(e)} style={{display:"grid",gap:10,cursor:onSelect?"pointer":"default"}}>
  <div className="row between"><strong style={{fontSize:16}}>{e.date} {e.start}</strong><div className="muted" style={{fontSize:12}}>{e.open} open</div></div>
  <div style={{fontWeight:700}}>{e.title}</div><div className="muted" style={{fontSize:13}}>{e.venue} / {e.area}</div>
  <div className="row" style={{gap:6,flexWrap:"wrap"}}>{e.tags.includes("recommended")&&<Badge t="rec">日本人おすすめ</Badge>}{e.tags.includes("beginner")&&<Badge t="beg">初心者向け</Badge>}{e.free&&<Badge t="free">無料</Badge>}</div>
  <div className="row" style={{gap:8}}><button className="btn btn-soft" style={{fontSize:12,color:"var(--map)"}}>Map</button><button className="btn btn-primary" style={{fontSize:12}}>{e.free?"詳細を見る":"チケット"}</button></div>
</div>}

function IdolCard({i,onSelect}){return <div className="card" onClick={()=>onSelect(i)} style={{cursor:"pointer"}}><div className="row between"><strong>{i.name}</strong><Badge t={i.status}>{i.status==="active"?"活動中":"休止中"}</Badge></div><div className="muted" style={{fontSize:12,marginTop:4}}>{i.jp}</div><div style={{marginTop:10}} className="row" >{i.rec&&<Badge t="rec">日本人おすすめ</Badge>}{i.beg&&<span style={{marginLeft:6}}><Badge t="beg">初心者向け</Badge></span>}</div></div>}

function BottomNav({page,setPage}){const tabs=[["home","Home"],["events","Events"],["idols","Idols"],["guide","Guide"]];return <nav className="row" style={{position:"sticky",bottom:0,background:"#fff",borderTop:"1px solid var(--border)"}}>{tabs.map(([k,l])=><button key={k} onClick={()=>setPage(k)} style={{flex:1,padding:"10px 0",border:0,background:"#fff",color:page===k?"var(--primary)":"var(--muted)",fontWeight:700}}>{l}</button>)}</nav>}

function App(){const [page,setPage]=useState("home"),[se,setSe]=useState(EVENTS[0]),[si,setSi]=useState(IDOLS[0]),[g,setG]=useState("jp");
return <>
<Header page={page} setPage={setPage}/><DisclaimerBanner/>
{page==="home"&&<main><section className="section" style={{background:"linear-gradient(145deg,#fff,#fff0f6)"}}><div style={{fontSize:12,letterSpacing:".1em",textTransform:"uppercase",color:"var(--primary)",fontWeight:700}}>Bangkok Underground Idol Guide</div><h1 style={{fontSize:28,lineHeight:1.3,margin:"8px 0 12px"}}>タイの地下アイドルライブ、今夜はここで。</h1><button className="btn btn-primary" onClick={()=>setPage("events")}>今日のライブを見る</button></section><section className="section"><h2>今日のライブ</h2><div style={{display:"grid",gap:10,marginTop:10}}>{EVENTS.map(e=><EventCard key={e.id} e={e} onSelect={(x)=>{setSe(x);setPage("event-detail")}}/>)}</div></section><section className="section"><h2>注目グループ</h2><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>{IDOLS.map(i=><IdolCard key={i.id} i={i} onSelect={(x)=>{setSi(x);setPage("idol-detail")}}/>)}</div></section></main>}
{page==="events"&&<main className="section"><h2>Events</h2><div className="row" style={{gap:8,flexWrap:"wrap",margin:"10px 0"}}><Badge>日付</Badge><Badge>エリア</Badge><Badge>日本人おすすめ</Badge><Badge>初心者向け</Badge><Badge>無料</Badge></div><div style={{display:"grid",gap:10}}>{EVENTS.map(e=><EventCard key={e.id} e={e} onSelect={(x)=>{setSe(x);setPage("event-detail")}}/>)}</div></main>}
{page==="event-detail"&&<main className="section"><button className="btn btn-soft" onClick={()=>setPage("events")}>← Events</button><h2 style={{marginTop:12}}>{se.title}</h2><p className="muted">{se.date} / 開場 {se.open} / 開演 {se.start}</p><div className="card" style={{marginTop:12}}><div>会場: {se.venue}</div><div className="muted">{se.area}</div><div className="row" style={{gap:8,marginTop:12}}><button className="btn btn-soft">Google Map</button><button className="btn btn-primary">チケット</button></div></div><div className="card" style={{marginTop:12}}><strong>出演グループ</strong><div className="muted" style={{marginTop:6}}>{se.groups.join(" / ")}</div></div><div className="card" style={{marginTop:12}}><strong>イベント概要</strong><p className="muted">{se.desc}</p><p className="muted">情報源: {se.source}</p><p className="muted">最終確認日: {se.checked}</p></div></main>}
{page==="idols"&&<main className="section"><h2>Idols</h2><div className="row" style={{gap:8,margin:"10px 0",flexWrap:"wrap"}}><Badge t="active">活動中のみ</Badge><Badge t="rec">日本人おすすめ</Badge><Badge t="beg">初心者向け</Badge></div><div style={{display:"grid",gap:10}}>{IDOLS.map(i=><IdolCard key={i.id} i={i} onSelect={(x)=>{setSi(x);setPage("idol-detail")}}/>)}</div></main>}
{page==="idol-detail"&&<main className="section"><button className="btn btn-soft" onClick={()=>setPage("idols")}>← Idols</button><h2 style={{marginTop:12}}>{si.name}</h2><p className="muted">{si.jp} / {si.th}</p><div className="card" style={{marginTop:12}}><p>{si.desc}</p><p className="muted">所属事務所: {si.agency}</p><p className="muted">活動拠点: {si.base}</p><p className="muted">SNS: {si.sns.join(" / ")}</p></div><div className="card" style={{marginTop:12}}><strong>今後の出演ライブ</strong>{EVENTS.map(e=><div key={e.id} className="muted" style={{marginTop:6}}>{e.date} {e.title}</div>)}</div></main>}
{page==="guide"&&<main className="section"><h2>Guide</h2><div className="row" style={{gap:8,margin:"10px 0"}}><button className="btn" onClick={()=>setG("jp")} style={{background:g==="jp"?"var(--soft)":"#fff",borderColor:"var(--border)"}}>日本人向け</button><button className="btn" onClick={()=>setG("th")} style={{background:g==="th"?"var(--soft)":"#fff",borderColor:"var(--border)"}}>タイ人向け</button></div><div className="card">{g==="jp"?"チケット購入・アクセス・マナーを解説。":"日本式アイドル文化・チェキ・コール文化を解説。"}</div></main>}
<footer style={{padding:"20px 16px",borderTop:"1px solid var(--border)",background:"#fff"}}><div className="row" style={{gap:12,flexWrap:"wrap",fontSize:13}}><span>About</span><span>情報修正</span><span>免責事項</span><span>SNS</span></div><p className="muted" style={{fontSize:12,marginTop:8}}>Unofficial Thai underground idol guide.</p></footer>
<BottomNav page={page} setPage={setPage}/></>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
